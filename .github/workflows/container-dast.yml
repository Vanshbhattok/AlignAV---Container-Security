name: Container & API DAST Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  issues: write

jobs:
  dast-analysis:
    name: Dynamic Web App & API DAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Dashboard Container Image
        run: |
          docker build -t mock-iot-hub:latest .

      - name: Run Dashboard Container
        run: |
          # Run the container in the background and map port 8080
          docker run -d -p 8080:8080 --name active-hub mock-iot-hub:latest
          
          # Poll the web server until it is fully active and returns HTTP 200
          echo "Waiting for containerized dashboard to start on port 8080..."
          for i in {1..15}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -q "200"; then
              echo "Container dashboard successfully online!"
              break
            fi
            sleep 1
          done

      - name: Configure Workspace Permissions for ZAP
        run: sudo chmod -R a+rw .

      - name: Run OWASP ZAP Baseline DAST Scan
        run: |
          # 1. Create placeholder report files and set permissions
          touch report_json.json report_md.md report_html.html
          chmod a+w report_json.json report_md.md report_html.html
          
          # 2. Run the ZAP container using host networking to access localhost:8080
          # We use "|| true" so that findings/warnings don't crash the script run before uploading artifacts
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            --network=host \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080/ \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html || true

      - name: Upload DAST HTML Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: report_html.html

      - name: Stop & Clean Up Container
        if: always()
        run: |
          docker stop active-hub
          docker rm active-hub
